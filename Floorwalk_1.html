<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Floorwalk — Flooring Sales Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ============ THEME TOKENS ============ */
:root{
  --bg:#f1ece4; --surface:#ffffff; --surface-2:#faf6f0; --surface-3:#f3ede4;
  --ink:#231f1a; --ink-2:#5b5147; --muted:#928678; --line:#e6dccd; --line-2:#efe7da;
  --accent:#8a5a2b; --accent-2:#6f4621; --accent-soft:#f1e4d3; --accent-ink:#ffffff;
  --good:oklch(0.60 0.09 150); --good-soft:oklch(0.94 0.04 150);
  --warn:oklch(0.70 0.12 72); --warn-soft:oklch(0.95 0.05 75);
  --danger:oklch(0.57 0.14 30); --danger-soft:oklch(0.95 0.05 32);
  --radius:14px; --radius-sm:10px; --radius-lg:20px;
  --shadow:0 1px 2px rgba(40,28,14,.05), 0 8px 24px -12px rgba(40,28,14,.18);
  --shadow-lg:0 12px 40px -12px rgba(40,28,14,.28);
  --fs:16px;
}
:root[data-theme="terracotta"]{
  --accent:#b0552f; --accent-2:#8f4324; --accent-soft:#f6e3d8;
}
:root[data-theme="slate"]{
  --accent:#3f5d78; --accent-2:#314a61; --accent-soft:#e0e7ee;
  --bg:#eef0f2; --surface-2:#f6f8fa; --surface-3:#eef1f4; --line:#dde2e7; --line-2:#e8ecf0; --muted:#7c8794;
}
:root[data-corners="sharp"]{ --radius:6px; --radius-sm:4px; --radius-lg:8px; }
:root[data-dark="true"]{
  --bg:#16120d; --surface:#211b14; --surface-2:#1b1610; --surface-3:#262017;
  --ink:#f3ece1; --ink-2:#cbbfae; --muted:#9b8f7e; --line:#352c20; --line-2:#2c241a;
  --accent-soft:#33271a;
  --good-soft:oklch(0.30 0.04 150); --warn-soft:oklch(0.32 0.05 75); --danger-soft:oklch(0.30 0.05 32);
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px -12px rgba(0,0,0,.6);
  --shadow-lg:0 12px 40px -12px rgba(0,0,0,.7);
}
:root[data-dark="true"][data-theme="slate"]{ --bg:#0f1419; --surface:#1a2027; --surface-2:#161b21; --surface-3:#1f262e; --line:#2a333d; }

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  font-family:"Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background:var(--bg); color:var(--ink); font-size:var(--fs);
  -webkit-font-smoothing:antialiased; line-height:1.45;
  overscroll-behavior:none;
}
#root{min-height:100vh;}

/* ============ APP SHELL ============ */
.app{
  max-width:780px; margin:0 auto; min-height:100vh; position:relative;
  background:var(--bg); display:flex; flex-direction:column;
}
@media(min-width:820px){
  body{padding:0;}
  .app{box-shadow:0 0 0 1px var(--line), var(--shadow-lg); min-height:100vh;}
}
.screen{flex:1; padding:0 0 96px; animation:fade .25s ease;}
@keyframes fade{from{opacity:0;} to{opacity:1;}}

/* ============ TOP BAR ============ */
.topbar{
  position:sticky; top:0; z-index:30; background:color-mix(in srgb, var(--surface) 88%, transparent);
  backdrop-filter:saturate(1.4) blur(12px); border-bottom:1px solid var(--line);
  padding:14px 18px; display:flex; align-items:center; gap:12px;
}
.topbar h1{font-size:19px; font-weight:800; letter-spacing:-.02em; margin:0; flex:1; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.topbar .sub{font-size:12.5px; color:var(--muted); font-weight:500;}
.iconbtn{
  width:40px; height:40px; flex:none; border:1px solid var(--line); background:var(--surface);
  border-radius:var(--radius-sm); display:grid; place-items:center; cursor:pointer; color:var(--ink);
  transition:.15s; padding:0;
}
.iconbtn:hover{background:var(--surface-2); border-color:var(--accent);}
.iconbtn.ghost{border-color:transparent; background:transparent;}
.iconbtn.ghost:hover{background:var(--surface-2);}

/* ============ BRAND ============ */
.brandmark{width:34px; height:34px; border-radius:9px; background:var(--accent); flex:none;
  display:grid; place-items:center; box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);}
.brandmark span{display:block; width:14px; height:14px; border-radius:3px;
  background:repeating-linear-gradient(90deg, var(--accent-ink) 0 3px, transparent 3px 5px);}

/* ============ GENERIC ============ */
.pad{padding:18px;}
.row{display:flex; align-items:center; gap:12px;}
.col{display:flex; flex-direction:column;}
.grow{flex:1; min-width:0;}
.spread{display:flex; align-items:center; justify-content:space-between; gap:12px;}
.muted{color:var(--muted);} .ink2{color:var(--ink-2);}
.tiny{font-size:12px;} .sm{font-size:13.5px;} .lg{font-size:18px;}
.b{font-weight:700;} .sb{font-weight:600;} .xb{font-weight:800; letter-spacing:-.01em;}
.eyebrow{font-size:11.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--muted);}
.divider{height:1px; background:var(--line); margin:14px 0;}
.spacer{height:14px;}

.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}
.card.flat{box-shadow:none;}
.section-title{font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 10px;}

/* Pills */
.pill{display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:999px;
  font-size:12px; font-weight:700; background:var(--surface-3); color:var(--ink-2); border:1px solid var(--line);
  white-space:nowrap;}
.pill .dot{width:7px; height:7px; border-radius:50%; background:currentColor;}
.pill.lead{color:var(--muted);}
.pill.quoting{color:var(--warn); background:var(--warn-soft); border-color:transparent;}
.pill.sold{color:var(--accent); background:var(--accent-soft); border-color:transparent;}
.pill.scheduled{color:var(--good); background:var(--good-soft); border-color:transparent;}
.pill.complete{color:var(--good); background:var(--good-soft); border-color:transparent;}

/* Buttons */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:inherit;
  font-size:15px; font-weight:700; padding:12px 18px; border-radius:var(--radius-sm); cursor:pointer;
  border:1px solid var(--line); background:var(--surface); color:var(--ink); transition:.15s; line-height:1;}
.btn:hover{background:var(--surface-2);}
.btn.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
.btn.primary:hover{background:var(--accent-2);}
.btn.block{width:100%;}
.btn.sm{font-size:13.5px; padding:9px 13px;}
.btn:active{transform:translateY(1px);}

/* Inputs */
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
.field label{font-size:12.5px; font-weight:700; color:var(--ink-2); letter-spacing:.01em;}
.input, textarea.input, select.input{
  font-family:inherit; font-size:15.5px; color:var(--ink); background:var(--surface);
  border:1px solid var(--line); border-radius:var(--radius-sm); padding:11px 13px; width:100%; transition:.15s;
}
.input:focus, textarea.input:focus, select.input:focus{outline:none; border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);}
.input::placeholder{color:var(--muted);}
textarea.input{resize:vertical; min-height:72px; line-height:1.5;}

/* Segmented control */
.seg{display:inline-flex; background:var(--surface-3); border:1px solid var(--line); border-radius:var(--radius-sm); padding:3px; gap:3px;}
.seg button{font-family:inherit; font-size:13.5px; font-weight:700; border:none; background:transparent;
  color:var(--ink-2); padding:7px 14px; border-radius:calc(var(--radius-sm) - 3px); cursor:pointer; transition:.15s;
  display:inline-flex; align-items:center; gap:6px;}
.seg button.on{background:var(--surface); color:var(--accent); box-shadow:var(--shadow);}
.seg.full{display:flex;} .seg.full button{flex:1; justify-content:center;}

/* Bottom tab bar */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:color-mix(in srgb, var(--surface) 90%, transparent); backdrop-filter:blur(14px) saturate(1.4);
  border-top:1px solid var(--line); display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  max-width:780px; margin:0 auto;
}
.tabbar button{flex:1; border:none; background:transparent; cursor:pointer; font-family:inherit;
  display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 4px; color:var(--muted);
  font-size:11px; font-weight:700; border-radius:10px; transition:.15s;}
.tabbar button.on{color:var(--accent);}
.tabbar button .badge{position:absolute; transform:translate(14px,-6px); background:var(--danger); color:#fff;
  font-size:9.5px; min-width:16px; height:16px; border-radius:8px; display:grid; place-items:center; padding:0 4px; font-weight:800;}

/* FAB */
.fab{position:fixed; right:max(18px, calc(50% - 390px + 18px)); bottom:calc(84px + env(safe-area-inset-bottom));
  z-index:45; width:56px; height:56px; border-radius:50%; background:var(--accent); color:var(--accent-ink);
  border:none; cursor:pointer; box-shadow:var(--shadow-lg); display:grid; place-items:center; transition:.15s;}
.fab:hover{background:var(--accent-2); transform:scale(1.04);}

/* Sheet / modal */
.scrim{position:fixed; inset:0; z-index:60; background:rgba(30,20,8,.42); backdrop-filter:blur(2px);
  display:flex; align-items:flex-end; justify-content:center; animation:fade .2s;}
@media(min-width:820px){ .scrim{align-items:center;} }
.sheet{background:var(--surface); width:100%; max-width:780px; max-height:92vh; overflow-y:auto;
  border-radius:var(--radius-lg) var(--radius-lg) 0 0; box-shadow:var(--shadow-lg); animation:slideup .28s cubic-bezier(.2,.8,.2,1);}
@media(min-width:820px){ .sheet{border-radius:var(--radius-lg); max-width:560px;} }
@keyframes slideup{from{transform:translateY(40px); opacity:.6;} to{transform:none; opacity:1;}}
.sheet-head{position:sticky; top:0; background:var(--surface); border-bottom:1px solid var(--line);
  padding:16px 18px; display:flex; align-items:center; gap:12px; z-index:2;}
.sheet-grab{width:38px; height:4px; border-radius:2px; background:var(--line); margin:8px auto 0;}

/* Checklist item */
.qitem{display:flex; gap:12px; padding:14px; border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); transition:.15s;}
.qitem + .qitem{margin-top:9px;}
.qitem.home{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
.qitem.answered{background:var(--surface-2);}
.checkbox{width:26px; height:26px; flex:none; border-radius:8px; border:2px solid var(--line); background:var(--surface);
  cursor:pointer; display:grid; place-items:center; transition:.15s; margin-top:1px;}
.checkbox.yes{background:var(--good); border-color:var(--good); color:#fff;}
.checkbox.no{background:var(--danger); border-color:var(--danger); color:#fff;}
.checkbox.flag{background:var(--warn); border-color:var(--warn); color:#fff;}

/* Product chip / status */
.prodcard{border:1px solid var(--line); border-radius:var(--radius); padding:13px 14px; background:var(--surface);}
.prodcard + .prodcard{margin-top:9px;}
.status-tag{font-size:11px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; padding:3px 8px; border-radius:6px;}
.status-tag.selected{background:var(--good-soft); color:var(--good);}
.status-tag.considering{background:var(--warn-soft); color:var(--warn);}

/* empty state */
.empty{text-align:center; padding:48px 28px; color:var(--muted);}
.empty .ic{width:60px; height:60px; border-radius:16px; background:var(--surface-3); display:grid; place-items:center; margin:0 auto 16px; color:var(--accent);}

/* photos */
.photogrid{display:grid; grid-template-columns:repeat(auto-fill, minmax(82px,1fr)); gap:8px;}
.thumb{aspect-ratio:1; border-radius:var(--radius-sm); border:1px solid var(--line); background-size:cover; background-position:center;
  cursor:pointer; padding:0; position:relative; overflow:hidden;}
.thumb.add{background:var(--surface-2); border:1.5px dashed var(--line); color:var(--accent); display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px; font-size:11px; font-weight:700; font-family:inherit;}
.thumb.add:hover{border-color:var(--accent); background:var(--accent-soft);}
.lightbox{position:fixed; inset:0; z-index:80; background:rgba(8,5,2,.94); display:flex; flex-direction:column;
  align-items:center; justify-content:center; animation:fade .2s;}
.lb-bar{position:absolute; top:0; left:0; right:0; display:flex; align-items:center; gap:8px; padding:14px 16px;
  background:linear-gradient(rgba(0,0,0,.5), transparent);}
.lb-img{max-width:94vw; max-height:84vh; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,.6);}

/* placeholder swatch for product imagery */
.swatch{width:46px; height:46px; border-radius:10px; flex:none; border:1px solid var(--line);
  background-image:repeating-linear-gradient(45deg, var(--surface-3) 0 6px, var(--surface-2) 6px 12px);}

/* progress bar */
.bar{height:8px; border-radius:999px; background:var(--surface-3); overflow:hidden;}
.bar > i{display:block; height:100%; background:var(--accent); border-radius:999px; transition:width .4s;}

a{color:var(--accent);}
.linkbtn{background:none; border:none; color:var(--accent); font-weight:700; font-family:inherit; cursor:pointer; padding:0; font-size:inherit;}
.scrim, .sheet{-webkit-overflow-scrolling:touch;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}
</style>
</head>

<script>
/* Floorwalk — seed data, question bank, persistence helpers (plain JS, window globals) */
(function () {
  "use strict";

  // ---- Product categories (become the per-room product tabs) ----

  const PROJECT_TYPES = [
    "Remodel / renovation",
    "New construction",
    "Whole-home",
    "Single-room replacement",

  const STATUSES = [

  // ---- Question bank ----

    // Discovery — always
    { id: "rooms",     ctx: ["store", "home"], cat: "Discovery",  q: "Which rooms are we doing?", hint: "Confirm full scope up front." },

    { id: "plumbing",  ctx: ["store", "home"], cat: "Trades",     q: "Any plumbing work needed?", hint: "Toilet pulls, supply lines, drains." },

    { id: "painting",  ctx: ["store", "home"], cat: "Trades",     q: "Painting before or after install?" },

    // AT-HOME ONLY — these light up when you switch to a home visit
    { id: "furniture", ctx: ["home"], cat: "In-Home",   q: "Who's moving the furniture — us or them?", hint: "Affects labor & schedule." },
    { id: "appliances",ctx: ["home"], cat: "In-Home",   q: "Appliances to disconnect / move?" },
    { id: "subfloor",  ctx: ["home"], cat: "In-Home",   q: "Subfloor condition — squeaks, soft spots, moisture?", hint: "Inspect before quoting." },

    return {

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
/* Floorwalk — shared UI (Sheet, Field) + Project list + New project */
const { useState, useEffect, useRef } = React;

/* ---------- Reusable bottom sheet / modal ---------- */
function Sheet({ title, onClose, children, foot }) {
  useEffect(() => {
    const h = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);
  return (
    <div className="scrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sheet" role="dialog" aria-modal="true">
        <div className="sheet-grab" />
        <div className="sheet-head">
          <button className="btn sm" style={{ padding: "8px 13px 8px 9px" }} onClick={onClose} aria-label="Back"><Icon name="back" size={17} />Back</button>
          <h2 className="xb" style={{ fontSize: 18, margin: 0, flex: 1, textAlign: "center" }}>{title}</h2>
          <button className="iconbtn ghost" onClick={onClose} aria-label="Close"><Icon name="x" /></button>
        </div>
        <div className="pad">{children}</div>
        {foot && <div className="pad" style={{ paddingTop: 0, position: "sticky", bottom: 0, background: "var(--surface)" }}>{foot}</div>}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return <div className="field"><label>{label}</label>{children}</div>;
}

function fmtDate(d) {
  if (!d) return "";
  try { return new Date(d + "T00:00").toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }
  catch (e) { return d; }
}
function relTime(ts) {
  const diff = Date.now() - ts, day = 86400000;
  if (diff < 3600000) return "just now";
  if (diff < day) return Math.round(diff / 3600000) + "h ago";
  if (diff < day * 7) return Math.round(diff / day) + "d ago";
  return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function money(n) { return "$" + (Number(n) || 0).toLocaleString(); }

/* ---------- Project list ---------- */
function ProjectList({ db, actions }) {
  const [q, setQ] = useState("");
  const [adding, setAdding] = useState(false);
  const list = db.projects
    .filter(p => (p.customerName + " " + p.address + " " + p.projectType).toLowerCase().includes(q.toLowerCase()))
    .sort((a, b) => b.updatedAt - a.updatedAt);

  return (
    <div className="screen">
      <div className="topbar">
        <div className="brandmark"><span /></div>
        <div className="grow">
          <h1 style={{ fontSize: 20 }}>Floorwalk</h1>
          <div className="sub">{db.projects.length} project{db.projects.length !== 1 ? "s" : ""}</div>
        </div>
        <button className="iconbtn" onClick={() => window.__fwToggleDark && window.__fwToggleDark()} aria-label="Toggle dark mode"><Icon name="sun" /></button>
      </div>

      <div className="pad" style={{ paddingBottom: 6 }}>
        <div className="row" style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: "var(--radius-sm)", padding: "0 13px" }}>
          <Icon name="search" size={18} style={{ color: "var(--muted)", flex: "none" }} />
          <input className="input" style={{ border: "none", padding: "12px 8px", background: "transparent" }}
            placeholder="Search customers, addresses…" value={q} onChange={e => setQ(e.target.value)} />
        </div>
      </div>

      <div className="pad" style={{ paddingTop: 8, display: "flex", flexDirection: "column", gap: 11 }}>
        {list.length === 0 && (
          <div className="empty">
            <div className="ic"><Icon name="store" size={28} /></div>
            <div className="b lg" style={{ color: "var(--ink)" }}>{q ? "No matches" : "No projects yet"}</div>
            <div className="sm" style={{ marginTop: 4 }}>{q ? "Try a different search." : "Tap + to start a customer walkthrough."}</div>
          </div>
        )}
        {list.map(p => <ProjectCard key={p.id} p={p} onOpen={() => actions.open(p.id)} />)}
      </div>

      <button className="fab" onClick={() => setAdding(true)} aria-label="New project"><Icon name="plus" size={26} /></button>

      {adding && <NewProjectSheet onClose={() => setAdding(false)} onCreate={(proj) => { actions.addProject(proj); setAdding(false); actions.open(proj.id); }} />}
    </div>
  );
}

function ProjectCard({ p, onOpen }) {
  const st = window.FW.STATUSES.find(s => s.id === p.status) || { label: p.status };
  const sel = p.rooms.reduce((n, r) => n + r.products.filter(x => x.status === "selected").length, 0);
  const openTasks = p.tasks.filter(t => !t.done).length;
  return (
    <button className="card" onClick={onOpen}
      style={{ textAlign: "left", cursor: "pointer", padding: 16, font: "inherit", color: "inherit", display: "block", width: "100%" }}>
      <div className="spread" style={{ alignItems: "flex-start" }}>
        <div className="grow">
          <div className="xb" style={{ fontSize: 17 }}>{p.customerName}</div>
          <div className="sm muted" style={{ marginTop: 2, display: "flex", alignItems: "center", gap: 5 }}>
            <Icon name="pin" size={13} /> {p.address || "No address yet"}
          </div>
        </div>
        <span className={"pill " + p.status}><span className="dot" />{st.label}</span>
      </div>
      <div className="row" style={{ marginTop: 13, gap: 8, flexWrap: "wrap" }}>
        <span className="pill" style={{ background: "var(--surface-3)" }}>{p.projectType}</span>
        <span className="pill" style={{ background: "var(--surface-3)" }}><Icon name="rooms" size={13} />{p.rooms.length} room{p.rooms.length !== 1 ? "s" : ""}</span>
        {sel > 0 && <span className="pill" style={{ background: "var(--surface-3)" }}><Icon name="check" size={13} />{sel} picked</span>}
        {openTasks > 0 && <span className="pill quoting"><Icon name="tasks" size={13} />{openTasks} to-do</span>}
      </div>
      <div className="divider" style={{ margin: "13px 0 10px" }} />
      <div className="spread">
        <span className="tiny muted">Updated {relTime(p.updatedAt)}</span>
        <span className="tiny b" style={{ color: "var(--accent)", display: "flex", alignItems: "center", gap: 3 }}>Open<Icon name="chevron" size={14} /></span>
      </div>
    </button>
  );
}

/* ---------- New project ---------- */
function NewProjectSheet({ onClose, onCreate }) {
  const [f, setF] = useState({ customerName: "", phone: "", email: "", address: "", projectType: window.FW.PROJECT_TYPES[0], visitContext: "store" });
  const set = (k, v) => setF(s => ({ ...s, [k]: v }));
  const valid = f.customerName.trim().length > 0;
  function create() {
    if (!valid) return;
    const now = Date.now();
    onCreate({ id: window.FW.uid("p"), ...f, status: "lead", budget: 0, targetDate: "", notes: "", createdAt: now, updatedAt: now, rooms: [], tasks: [] });
  }
  return (
    <Sheet title="New project" onClose={onClose}
      foot={<button className="btn primary block" disabled={!valid} style={{ opacity: valid ? 1 : .5 }} onClick={create}>Start walkthrough</button>}>
      <Field label="Customer name *"><input className="input" autoFocus placeholder="e.g. Dana & Mark Whitfield" value={f.customerName} onChange={e => set("customerName", e.target.value)} /></Field>
      <div className="row" style={{ gap: 10, alignItems: "stretch" }}>
        <div style={{ flex: 1 }}><Field label="Phone"><input className="input" type="tel" placeholder="(555) 000-0000" value={f.phone} onChange={e => set("phone", e.target.value)} /></Field></div>
      </div>
      <Field label="Email"><input className="input" type="email" placeholder="name@email.com" value={f.email} onChange={e => set("email", e.target.value)} /></Field>
      <Field label="Address / job site"><input className="input" placeholder="Street, city" value={f.address} onChange={e => set("address", e.target.value)} /></Field>
      <Field label="Project type">
        <select className="input" value={f.projectType} onChange={e => set("projectType", e.target.value)}>
          {window.FW.PROJECT_TYPES.map(t => <option key={t}>{t}</option>)}
        </select>
      </Field>
      <Field label="Where are you meeting?">
        <div className="seg full">
          <button className={f.visitContext === "store" ? "on" : ""} onClick={() => set("visitContext", "store")}><Icon name="store" size={16} />In store</button>
          <button className={f.visitContext === "home" ? "on" : ""} onClick={() => set("visitContext", "home")}><Icon name="home" size={16} />At home</button>
        </div>
      </Field>
    </Sheet>
  );
}

Object.assign(window, { Sheet, Field, fmtDate, relTime, money, ProjectList });

</script>
<script type="text/babel">
/* Floorwalk — in-app photo capture (compress + store + gallery + lightbox) */

// Downscale + compress a captured file to a JPEG data URL so localStorage survives.
async function fileToThumb(file, max = 1000, q = 0.62) {
  let bmp;
  try { bmp = await createImageBitmap(file, { imageOrientation: "from-image" }); }
  catch (e) {
    bmp = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = URL.createObjectURL(file); });
  }
  let w = bmp.width, h = bmp.height;
  const s = Math.min(1, max / Math.max(w, h));
  w = Math.round(w * s); h = Math.round(h * s);
  const c = document.createElement("canvas"); c.width = w; c.height = h;
  c.getContext("2d").drawImage(bmp, 0, 0, w, h);
  if (bmp.close) bmp.close();
  return c.toDataURL("image/jpeg", q);
}

// Open the device camera / file picker and return a photo object.
function pickPhoto(onPick) {
  const input = document.createElement("input");
  input.type = "file"; input.accept = "image/*"; input.setAttribute("capture", "environment");
  input.onchange = async () => {
    const f = input.files && input.files[0];
    if (!f) return;
    try { const src = await fileToThumb(f); onPick({ id: window.FW.uid("ph"), src, ts: Date.now() }); }
    catch (e) { alert("Couldn't read that image."); }
  };
  input.click();
}

// Full-screen viewer
function Lightbox({ photo, onClose, onRemove, caption }) {
  useEffect(() => {
    const h = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
  }, []);
  return (
    <div className="lightbox" onClick={onClose}>
      <div className="lb-bar" onClick={e => e.stopPropagation()}>
        <button className="btn sm" style={{ padding: "8px 13px 8px 9px", background: "rgba(255,255,255,.12)", color: "#fff", borderColor: "rgba(255,255,255,.25)" }} onClick={onClose}><Icon name="back" size={17} />Back</button>
        <span className="sm b" style={{ color: "#fff", flex: 1, textAlign: "center" }}>{caption || "Photo"}</span>
        {onRemove && <button className="iconbtn ghost" style={{ color: "#fff" }} onClick={() => { if (confirm("Delete this photo?")) onRemove(); }} aria-label="Delete"><Icon name="trash" /></button>}
      </div>
      <img src={photo.src} className="lb-img" onClick={e => e.stopPropagation()} alt="" />
    </div>
  );
}

// Thumbnail grid + add tile
function PhotoStrip({ photos = [], onAdd, onRemove, hint, addLabel = "Add" }) {
  const [view, setView] = useState(null);
  return (
    <div>
      <div className="photogrid">
        {photos.map(p => (
          <button key={p.id} className="thumb" style={{ backgroundImage: `url(${p.src})` }} onClick={() => setView(p)} aria-label="View photo" />
        ))}
        {onAdd && (
          <button className="thumb add" onClick={() => pickPhoto(onAdd)}>
            <Icon name="camera" size={22} /><span>{addLabel}</span>
          </button>
        )}
      </div>
      {hint && photos.length === 0 && <div className="tiny muted" style={{ marginTop: 8 }}>{hint}</div>}
      {view && <Lightbox photo={view} onClose={() => setView(null)}
        onRemove={onRemove ? () => { onRemove(view.id); setView(null); } : null} />}
    </div>
  );
}

// Compact camera button (one-tap capture) with a count badge — for product rows / top bars
function CameraButton({ count = 0, onAdd, ghost }) {
  return (
    <button className={"iconbtn" + (ghost ? " ghost" : "")} style={{ position: "relative" }} onClick={() => pickPhoto(onAdd)} aria-label="Take photo">
      <Icon name="camera" />
      {count > 0 && <span style={{ position: "absolute", top: -6, right: -6, background: "var(--accent)", color: "var(--accent-ink)", fontSize: 10, fontWeight: 800, minWidth: 16, height: 16, borderRadius: 8, display: "grid", placeItems: "center", padding: "0 4px" }}>{count}</span>}
    </button>
  );
}

/* ---------- Project-wide photo gallery ---------- */
function ProjectPhotosSheet({ p, mutate, onClose }) {
  const general = p.photos || [];
  const addGeneral = (ph) => mutate(p.id, d => { d.photos = d.photos || []; d.photos.push(ph); });
  const removeAny = (id) => mutate(p.id, d => {
    d.photos = (d.photos || []).filter(x => x.id !== id);
    d.rooms.forEach(r => { r.photos = (r.photos || []).filter(x => x.id !== id); r.products.forEach(pr => { pr.photos = (pr.photos || []).filter(x => x.id !== id); }); });
  });
  const [view, setView] = useState(null);

  const roomBlocks = p.rooms.map(r => {
    const prodPhotos = r.products.flatMap(pr => (pr.photos || []).map(ph => ({ ...ph, cap: r.name + " · " + (pr.name || "product") })));
    const roomPhotos = (r.photos || []).map(ph => ({ ...ph, cap: r.name }));
    return { room: r, photos: [...roomPhotos, ...prodPhotos] };
  }).filter(b => b.photos.length);

  const totalRoom = roomBlocks.reduce((n, b) => n + b.photos.length, 0);

  return (
    <Sheet title={`Photos (${general.length + totalRoom})`} onClose={onClose}>
      <div className="section-title">General job-site photos</div>
      <PhotoStrip photos={general} onAdd={addGeneral} onRemove={removeAny} addLabel="Camera"
        hint="House exterior, existing floors, anything you want on file." />

      {roomBlocks.map(b => (
        <div key={b.room.id} style={{ marginTop: 18 }}>
          <div className="section-title">{b.room.name}</div>
          <div className="photogrid">
            {b.photos.map(ph => <button key={ph.id} className="thumb" style={{ backgroundImage: `url(${ph.src})` }} onClick={() => setView(ph)} aria-label="View" />)}
          </div>
        </div>
      ))}

      {general.length + totalRoom === 0 && (
        <div className="empty" style={{ padding: "28px 0 8px" }}>
          <div className="sm">Photos you take in rooms and on product selections collect here too.</div>
        </div>
      )}
      {view && <Lightbox photo={view} caption={view.cap} onClose={() => setView(null)} onRemove={() => { removeAny(view.id); setView(null); }} />}
    </Sheet>
  );
}

function countPhotos(p) {
  let n = (p.photos || []).length;
  p.rooms.forEach(r => { n += (r.photos || []).length; r.products.forEach(pr => { n += (pr.photos || []).length; }); });
  return n;
}

Object.assign(window, { PhotoStrip, CameraButton, ProjectPhotosSheet, pickPhoto, countPhotos });

</script>
<script type="text/babel">
/* Floorwalk — Rooms tab + Room editor (product checklist by category) */
function RoomsTab({ p, mutate, ctx }) {

  const [adding, setAdding] = useState(false);

      {p.rooms.length === 0 && (
        <div className="empty card flat" style={{ background: "var(--surface-2)" }}>
          <div className="ic"><Icon name="rooms" size={26} /></div>

          return (
            <button key={r.id} className="card" onClick={() => setOpenId(r.id)}

                <div className="grow">

                  <div className="sm muted" style={{ marginTop: 2 }}>{r.sqft ? r.sqft + " sq ft" : "No measurement"}{r.notes ? " · " + r.notes.slice(0, 38) : ""}</div>

              </div>
              {(sel > 0 || con > 0) && (
                <div className="row" style={{ marginTop: 11, gap: 7, flexWrap: "wrap" }}>
                  {sel > 0 && <span className="status-tag selected">{sel} selected</span>}

      {adding && <AddRoomSheet onClose={() => setAdding(false)} onAdd={addRoom} existing={p.rooms.map(r => r.name)} />}

function AddRoomSheet({ onClose, onAdd, existing }) {
  const [custom, setCustom] = useState("");

  return (

        {avail.map(name => (
          <button key={name} className="btn" style={{ justifyContent: "flex-start", fontWeight: 600 }} onClick={() => onAdd(name)}>
            <Icon name="rooms" size={15} style={{ color: "var(--accent)" }} />{name}
          </button>
        ))}
      </div>
      <Field label="Or type a custom name">
        <div className="row" style={{ gap: 8 }}>
          <input className="input" placeholder="e.g. Sunroom" value={custom} onChange={e => setCustom(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && custom.trim()) onAdd(custom.trim()); }} />
          <button className="btn primary" disabled={!custom.trim()} style={{ opacity: custom.trim() ? 1 : .5 }} onClick={() => custom.trim() && onAdd(custom.trim())}>Add</button>
        </div>
      </Field>
    </Sheet>

}

/* ---------- Room editor ---------- */
function RoomEditor({ p, room, mutate, onClose }) {
  const [addCat, setAddCat] = useState(null); // category id being added
  const upd = (fn) => mutate(p.id, d => { const r = d.rooms.find(x => x.id === room.id); fn(r); });

  function addProduct(catId, data) {
    upd(r => r.products.push({ id: window.FW.uid("pr"), cat: catId, ...data }));
    setAddCat(null);
  }
  const groups = window.FW.CATEGORIES;
  const byCat = {};
  room.products.forEach(pr => { (byCat[pr.cat] = byCat[pr.cat] || []).push(pr); });
  const usedCats = groups.filter(c => byCat[c.id]);

  return (
    <Sheet title={room.name} onClose={onClose}
      foot={
        <button className="btn block" style={{ color: "var(--danger)", borderColor: "var(--line)" }}
          onClick={() => { if (confirm("Delete this room?")) { mutate(p.id, d => { d.rooms = d.rooms.filter(x => x.id !== room.id); }); onClose(); } }}>

        </button>
      }>
      <div className="row" style={{ gap: 10, marginBottom: 16 }}>
        <div style={{ width: 120 }}>
          <Field label="Measurement"><div className="row" style={{ gap: 6 }}>

            <span className="sm muted b">ft²</span>
          </div></Field>
        </div>
        <div className="grow">
          <Field label="Room note"><input className="input" placeholder="e.g. open to dining" value={room.notes} onChange={e => upd(r => r.notes = e.target.value)} /></Field>
        </div>
      </div>

      <div className="section-title">In-home & room photos</div>
      <div style={{ marginBottom: 18 }}>
        <PhotoStrip photos={room.photos || []} addLabel="Camera"
          onAdd={ph => upd(r => { r.photos = r.photos || []; r.photos.push(ph); })}
          onRemove={id => upd(r => { r.photos = (r.photos || []).filter(x => x.id !== id); })}
          hint="Snap the space, subfloor, transitions, problem areas — saved with this room." />
      </div>

      <div className="section-title">Product selections</div>
      {room.products.length === 0 && <div className="sm muted" style={{ marginBottom: 12 }}>Nothing added yet — pick a category below.</div>}

      {usedCats.map(c => (
        <div key={c.id} style={{ marginBottom: 12 }}>
          <div className="eyebrow" style={{ marginBottom: 7 }}>{c.label}</div>
          {byCat[c.id].map(pr => <ProductRow key={pr.id} pr={pr} upd={upd} />)}
        </div>
      ))}

      {addCat ? (
        <AddProductForm cat={groups.find(c => c.id === addCat)} onCancel={() => setAddCat(null)} onSave={(data) => addProduct(addCat, data)} />
      ) : (
        <div style={{ marginTop: 8 }}>
          <div className="eyebrow" style={{ marginBottom: 8 }}>Add selection</div>
          <div className="row" style={{ gap: 7, flexWrap: "wrap" }}>
            {groups.map(c => (
              <button key={c.id} className="pill" style={{ cursor: "pointer", background: "var(--surface)", padding: "7px 12px" }} onClick={() => setAddCat(c.id)}>
                <Icon name="plus" size={13} />{c.label}
              </button>
            ))}
          </div>
        </div>
      )}
    </Sheet>
  );
}

function ProductRow({ pr, upd }) {
  const [open, setOpen] = useState(false);
  const cycle = () => upd(r => { const x = r.products.find(q => q.id === pr.id); x.status = x.status === "selected" ? "considering" : "selected"; });
  const addPhoto = (ph) => upd(r => { const x = r.products.find(q => q.id === pr.id); x.photos = x.photos || []; x.photos.push(ph); });
  const removePhoto = (id) => upd(r => { const x = r.products.find(q => q.id === pr.id); x.photos = (x.photos || []).filter(y => y.id !== id); });
  const photos = pr.photos || [];
  return (
    <div className="prodcard">
      <div className="row" style={{ gap: 10, alignItems: "flex-start" }}>
        <div className="swatch" style={photos[0] ? { backgroundImage: `url(${photos[0].src})`, backgroundSize: "cover", backgroundPosition: "center" } : null} />
        <div className="grow" onClick={() => setOpen(o => !o)} style={{ cursor: "pointer" }}>
          <div className="b" style={{ fontSize: 15 }}>{pr.name || "Unnamed"}</div>
          <div className="sm muted">{[pr.color, pr.note].filter(Boolean).join(" · ") || "Tap to edit"}</div>
        </div>
        <CameraButton count={photos.length} onAdd={addPhoto} ghost />
        <button className={"status-tag " + pr.status} style={{ cursor: "pointer", border: "none" }} onClick={cycle}>{pr.status}</button>
      </div>
      {photos.length > 0 && (
        <div style={{ marginTop: 11 }}>
          <PhotoStrip photos={photos} onAdd={addPhoto} onRemove={removePhoto} addLabel="Add" />
        </div>
      )}
      {open && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--line)" }}>
          <div className="row" style={{ gap: 8, marginBottom: 8 }}>
            <input className="input" placeholder="Product / SKU" value={pr.name} onChange={e => upd(r => r.products.find(q => q.id === pr.id).name = e.target.value)} />
          </div>
          <div className="row" style={{ gap: 8, marginBottom: 8 }}>
            <input className="input" placeholder="Color" value={pr.color} onChange={e => upd(r => r.products.find(q => q.id === pr.id).color = e.target.value)} />

}

function AddProductForm({ cat, onCancel, onSave }) {
  const [d, setD] = useState({ name: "", color: "", note: "", status: "considering" });
  const set = (k, v) => setD(s => ({ ...s, [k]: v }));
  return (
    <div className="card" style={{ padding: 14, marginTop: 8, background: "var(--surface-2)" }}>
      <div className="spread" style={{ marginBottom: 10 }}>
        <div className="b">{cat.label}</div>
        <button className="iconbtn ghost" onClick={onCancel}><Icon name="x" size={18} /></button>
      </div>
      <input className="input" autoFocus placeholder="Product / SKU name" value={d.name} onChange={e => set("name", e.target.value)} style={{ marginBottom: 8 }} />
      <div className="row" style={{ gap: 8, marginBottom: 10 }}>
        <input className="input" placeholder="Color" value={d.color} onChange={e => set("color", e.target.value)} />
        <input className="input" placeholder="Note" value={d.note} onChange={e => set("note", e.target.value)} />
      </div>

          <button className={d.status === "selected" ? "on" : ""} onClick={() => set("status", "selected")}>Selected</button>
