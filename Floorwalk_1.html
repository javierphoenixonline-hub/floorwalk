Object.assign(window, { RoomsTab });

</script>
<script type="text/babel">
/* Floorwalk — Questions tab (context-aware reminders) */
function QuestionsTab({ p, mutate, ctx }) {
  const all = window.FW.QUESTIONS;
  const active = all.filter(q => q.ctx.includes(ctx));
  const homeOnly = all.filter(q => !q.ctx.includes("store")); // light up at the home visit
  const answers = p.answers || {};

  // group active questions by category, preserving order
  const cats = [];
  active.forEach(q => { if (!cats.includes(q.cat)) cats.push(q.cat); });

  const setAns = (qid, patch) => mutate(p.id, d => { d.answers = d.answers || {}; d.answers[qid] = { ...(d.answers[qid] || {}), ...patch }; });
  const cycle = (qid) => {
    const order = [undefined, "yes", "no", "flag"];
    const cur = (answers[qid] || {}).val;
    const next = order[(order.indexOf(cur) + 1) % order.length];
    setAns(qid, { val: next });
  };
  const addTask = (text) => mutate(p.id, d => d.tasks.push({ id: window.FW.uid("t"), text, done: false, due: "" }));

  const unanswered = active.filter(q => !(answers[q.id] || {}).val).length;

  return (
    <div className="pad">
      {/* context banner */}
      <div className="card" style={{ padding: 14, marginBottom: 14, background: ctx === "home" ? "var(--accent-soft)" : "var(--surface-2)", borderColor: ctx === "home" ? "var(--accent)" : "var(--line)" }}>
        <div className="row" style={{ gap: 11 }}>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: "var(--surface)", display: "grid", placeItems: "center", color: "var(--accent)", flex: "none" }}>
            <Icon name={ctx === "home" ? "home" : "store"} size={20} />
          </div>
          <div className="grow">
            <div className="b">{ctx === "home" ? "At-home visit" : "In-store visit"}</div>
            <div className="sm muted">{ctx === "home"
              ? "On-site questions are highlighted — confirm conditions now."
              : "Discovery & selection questions. In-home items wait for the visit."}</div>
          </div>
          <div style={{ textAlign: "right", flex: "none" }}>
            <div className="xb" style={{ fontSize: 22, color: unanswered ? "var(--accent)" : "var(--good)" }}>{unanswered}</div>
            <div className="tiny muted b">left</div>
          </div>
        </div>
      </div>

      {cats.map(cat => {
        const qs = active.filter(q => q.cat === cat);
        const isHomeCat = cat === "In-Home";
        return (
          <div key={cat} style={{ marginBottom: 18 }}>
            <div className="spread" style={{ marginBottom: 9 }}>
              <div className="section-title" style={{ margin: 0, color: isHomeCat && ctx === "home" ? "var(--accent)" : "var(--muted)" }}>{cat}</div>
              {isHomeCat && ctx === "home" && <span className="pill sold" style={{ fontSize: 10.5 }}>Now that you're here</span>}
            </div>
            {qs.map(q => (
              <QRow key={q.id} q={q} ans={answers[q.id] || {}} highlight={isHomeCat && ctx === "home"}
                onCycle={() => cycle(q.id)} onNote={(v) => setAns(q.id, { note: v })} onTask={() => addTask(q.q)} />
            ))}
          </div>
        );
      })}

      {/* upcoming home questions when in store */}
      {ctx === "store" && (
        <div style={{ marginTop: 8 }}>
          <div className="divider" />
          <div className="row" style={{ gap: 8, marginBottom: 10 }}>
            <Icon name="home" size={16} style={{ color: "var(--muted)" }} />
            <div className="section-title" style={{ margin: 0 }}>Save for the home visit</div>
          </div>
          <div className="sm muted" style={{ marginBottom: 11 }}>Switch this project to <b>At home</b> when you're on site and these become active.</div>
          {homeOnly.map(q => (
            <div key={q.id} className="qitem" style={{ opacity: .6, padding: "11px 14px" }}>
              <Icon name="pin" size={16} style={{ color: "var(--muted)", marginTop: 2, flex: "none" }} />
              <div className="grow"><div className="sm b">{q.q}</div>{q.hint && <div className="tiny muted">{q.hint}</div>}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function QRow({ q, ans, highlight, onCycle, onNote, onTask }) {
  const [open, setOpen] = useState(false);
  const val = ans.val;
  const cls = val === "yes" ? "yes" : val === "no" ? "no" : val === "flag" ? "flag" : "";
  const icon = val === "yes" ? "check" : val === "no" ? "x" : val === "flag" ? "flag" : null;
  return (
    <div className={"qitem" + (highlight ? " home" : "") + (val ? " answered" : "")}>
      <button className={"checkbox " + cls} onClick={onCycle} aria-label="Cycle answer">
        {icon && <Icon name={icon} size={16} />}
      </button>
      <div className="grow">
        <div className="sb" style={{ fontSize: 14.5, lineHeight: 1.35 }}>{q.q}</div>
        {q.hint && <div className="tiny muted" style={{ marginTop: 2 }}>{q.hint}</div>}
        {ans.note && <div className="sm" style={{ marginTop: 6, padding: "7px 10px", background: "var(--surface-3)", borderRadius: 8 }}>{ans.note}</div>}
        <div className="row" style={{ gap: 14, marginTop: 8 }}>
          <button className="linkbtn tiny" onClick={() => setOpen(o => !o)}><Icon name="note" size={12} style={{ verticalAlign: -2 }} /> {ans.note ? "Edit note" : "Note"}</button>
          {(val === "yes" || val === "flag") && <button className="linkbtn tiny" onClick={onTask}><Icon name="plus" size={12} style={{ verticalAlign: -2 }} /> Follow-up</button>}
        </div>
        {open && (
          <textarea className="input" autoFocus style={{ marginTop: 8, minHeight: 56 }} placeholder="Add detail…" defaultValue={ans.note || ""}
            onBlur={e => { onNote(e.target.value); setOpen(false); }} />
        )}
      </div>
    </div>
  );
}

Object.assign(window, { QuestionsTab });

</script>
<script type="text/babel">
/* Floorwalk — Budget, Tasks, Export */
function BudgetTab({ p, mutate }) {
  const items = p.estimate || [];
  const total = items.reduce((s, i) => s + (Number(i.amt) || 0), 0);
  const budget = Number(p.budget) || 0;
  const pct = budget ? Math.min(100, Math.round((total / budget) * 100)) : 0;
  const over = budget && total > budget;
  const add = () => mutate(p.id, d => { d.estimate = d.estimate || []; d.estimate.push({ id: window.FW.uid("e"), label: "", amt: "" }); });
  const set = (id, k, v) => mutate(p.id, d => { d.estimate.find(x => x.id === id)[k] = v; });
  const del = (id) => mutate(p.id, d => { d.estimate = d.estimate.filter(x => x.id !== id); });

  return (
    <div className="pad">
      <div className="card" style={{ padding: 16, marginBottom: 16 }}>
        <div className="spread" style={{ marginBottom: 6 }}>
          <div className="grow"><Field label="Customer budget">
            <div className="row" style={{ gap: 6 }}>
              <span className="lg b muted">$</span>
              <input className="input" type="number" inputMode="numeric" placeholder="0" value={p.budget || ""} onChange={e => mutate(p.id, d => d.budget = e.target.value)} />
            </div>
          </Field></div>
        </div>
        <div className="spread" style={{ marginBottom: 7 }}>
          <span className="sm muted b">Running estimate</span>
          <span className="b" style={{ color: over ? "var(--danger)" : "var(--ink)" }}>{money(total)}</span>
        </div>
        <div className="bar"><i style={{ width: pct + "%", background: over ? "var(--danger)" : "var(--accent)" }} /></div>
        <div className="spread" style={{ marginTop: 7 }}>
          <span className="tiny muted">{budget ? pct + "% of budget" : "Set a budget to track"}</span>
          {budget > 0 && <span className="tiny b" style={{ color: over ? "var(--danger)" : "var(--good)" }}>{over ? money(total - budget) + " over" : money(budget - total) + " left"}</span>}
        </div>
      </div>

      <div className="spread" style={{ marginBottom: 11 }}>
        <div className="section-title" style={{ margin: 0 }}>Estimate line items</div>
        <button className="btn sm" onClick={add}><Icon name="plus" size={15} />Add</button>
      </div>
      {items.length === 0 && <div className="sm muted" style={{ marginBottom: 10 }}>Add rooms, materials, labor, removal, etc.</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {items.map(i => (
          <div key={i.id} className="row" style={{ gap: 8 }}>
            <input className="input" placeholder="e.g. Kitchen LVP + install" value={i.label} onChange={e => set(i.id, "label", e.target.value)} />
            <div className="row" style={{ gap: 2, width: 120, flex: "none" }}>
              <span className="muted b">$</span>
              <input className="input" type="number" inputMode="numeric" placeholder="0" value={i.amt} onChange={e => set(i.id, "amt", e.target.value)} />
            </div>
            <button className="iconbtn ghost" onClick={() => del(i.id)} aria-label="Remove"><Icon name="x" size={18} /></button>
          </div>
        ))}
      </div>
    </div>
  );
}

function TasksTab({ p, mutate }) {
  const [text, setText] = useState("");
  const tasks = [...p.tasks].sort((a, b) => (a.done - b.done));
  const add = () => { if (!text.trim()) return; mutate(p.id, d => d.tasks.push({ id: window.FW.uid("t"), text: text.trim(), done: false, due: "" })); setText(""); };
  const toggle = (id) => mutate(p.id, d => { const t = d.tasks.find(x => x.id === id); t.done = !t.done; });
  const setDue = (id, v) => mutate(p.id, d => d.tasks.find(x => x.id === id).due = v);
  const del = (id) => mutate(p.id, d => d.tasks = d.tasks.filter(x => x.id !== id));
  const open = tasks.filter(t => !t.done).length;

  return (
    <div className="pad">
      <div className="section-title">Follow-ups & reminders {open > 0 && <span style={{ color: "var(--accent)" }}>· {open} open</span>}</div>
      <div className="row" style={{ gap: 8, marginBottom: 14 }}>
        <input className="input" placeholder="Add a follow-up…" value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
        <button className="btn primary" onClick={add}><Icon name="plus" size={18} /></button>
      </div>
      {tasks.length === 0 && (
        <div className="empty card flat" style={{ background: "var(--surface-2)" }}>
          <div className="ic"><Icon name="tasks" size={24} /></div>
          <div className="b" style={{ color: "var(--ink)" }}>All clear</div>
        </div>
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
        {tasks.map(t => (
          <div key={t.id} className="qitem" style={{ alignItems: "center", opacity: t.done ? .55 : 1 }}>
            <button className={"checkbox " + (t.done ? "yes" : "")} onClick={() => toggle(t.id)} aria-label="Toggle">{t.done && <Icon name="check" size={16} />}</button>
            <div className="grow">
              <div className="sb" style={{ textDecoration: t.done ? "line-through" : "none" }}>{t.text}</div>
              <div className="row" style={{ gap: 6, marginTop: 5 }}>
                <Icon name="calendar" size={13} style={{ color: "var(--muted)" }} />
                <input type="date" className="input" style={{ width: "auto", padding: "4px 8px", fontSize: 12.5, border: "none", background: "var(--surface-3)" }}
                  value={t.due} onChange={e => setDue(t.id, e.target.value)} />
              </div>
            </div>
            <button className="iconbtn ghost" onClick={() => del(t.id)} aria-label="Delete"><Icon name="trash" size={17} /></button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Export ---------- */
function buildCSV(p) {
  const rows = [["Section", "Item", "Detail", "Status/Value"]];
  rows.push(["Customer", p.customerName, p.phone + " " + p.email, p.status]);
  rows.push(["Site", p.address, p.projectType, p.visitContext === "home" ? "At home" : "In store"]);
  rows.push(["Budget", "Target", "", p.budget || ""]);
  p.rooms.forEach(r => {
    rows.push(["Room", r.name, r.sqft ? r.sqft + " sqft" : "", r.notes || ""]);
    r.products.forEach(pr => {
      const c = window.FW.CATEGORIES.find(x => x.id === pr.cat);
      rows.push(["  Product", (c ? c.label + ": " : "") + pr.name, [pr.color, pr.note].filter(Boolean).join(" / "), pr.status]);
    });
  });
  const A = p.answers || {};
  window.FW.QUESTIONS.forEach(q => { if (A[q.id] && A[q.id].val) rows.push(["Q&A", q.q, A[q.id].note || "", A[q.id].val]); });
  p.tasks.forEach(t => rows.push(["Task", t.text, t.due || "", t.done ? "done" : "open"]));
  return rows.map(r => r.map(c => `"${String(c == null ? "" : c).replace(/"/g, '""')}"`).join(",")).join("\n");
}

/* ---------- Printable one-page summary ---------- */
function buildSummaryHTML(p) {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const cat = (id) => (window.FW.CATEGORIES.find(c => c.id === id) || {}).label || id;
  const st = (window.FW.STATUSES.find(s => s.id === p.status) || {}).label || p.status;
  const A = p.answers || {};
  const valLabel = { yes: "Yes", no: "No", flag: "Follow up" };
  const fdate = (d) => { try { return d ? new Date(d + "T00:00").toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : ""; } catch (e) { return d; } };
  const today = new Date().toLocaleDateString(undefined, { month: "long", day: "numeric", year: "numeric" });
  const m = (n) => "$" + (Number(n) || 0).toLocaleString();
  const estTotal = (p.estimate || []).reduce((s, i) => s + (Number(i.amt) || 0), 0);

  const rooms = p.rooms.map(r => {
    const prods = r.products.map(pr => `<tr><td class="cat">${esc(cat(pr.cat))}</td><td><b>${esc(pr.name || "—")}</b>${pr.color || pr.note ? `<span class="sub"> — ${esc([pr.color, pr.note].filter(Boolean).join(", "))}</span>` : ""}</td><td class="st ${pr.status}">${pr.status === "selected" ? "Selected" : "Considering"}</td></tr>`).join("");
    const allPhotos = [...(r.photos || []), ...r.products.flatMap(pr => pr.photos || [])];
    const photos = allPhotos.length ? `<div class="photos">${allPhotos.slice(0, 8).map(ph => `<img src="${ph.src}"/>`).join("")}</div>` : "";
    return `<div class="room"><div class="rhead"><h3>${esc(r.name)}</h3><span class="sub">${r.sqft ? esc(r.sqft) + " sq ft" : ""}</span></div>${r.notes ? `<div class="rnote">${esc(r.notes)}</div>` : ""}${prods ? `<table>${prods}</table>` : `<div class="empty">No selections yet</div>`}${photos}</div>`;
  }).join("");

  const answered = window.FW.QUESTIONS.filter(q => A[q.id] && A[q.id].val);
  const qa = answered.length ? `<table class="qa">${answered.map(q => `<tr><td>${esc(q.q)}</td><td class="a ${A[q.id].val}">${valLabel[A[q.id].val] || ""}</td><td class="sub">${esc(A[q.id].note || "")}</td></tr>`).join("")}</table>` : `<div class="empty">No questions logged yet</div>`;

  const est = (p.estimate || []).length ? `<table class="est">${(p.estimate).map(i => `<tr><td>${esc(i.label || "—")}</td><td class="num">${m(i.amt)}</td></tr>`).join("")}<tr class="tot"><td>Estimate total</td><td class="num">${m(estTotal)}</td></tr>${p.budget ? `<tr><td>Customer budget</td><td class="num">${m(p.budget)}</td></tr>` : ""}</table>` : "";

  const openTasks = p.tasks.filter(t => !t.done);
  const tasks = openTasks.length ? `<ul class="tasks">${openTasks.map(t => `<li>□ ${esc(t.text)}${t.due ? ` <span class="sub">(by ${fdate(t.due)})</span>` : ""}</li>`).join("")}</ul>` : "";

  return `<!doctype html><html><head><meta charset="utf-8"><title>${esc(p.customerName)} — Project Summary</title><style>
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:#231f1a;font-size:13px;line-height:1.5;}
    .wrap{max-width:760px;margin:0 auto;padding:32px 30px;}
    .top{display:flex;align-items:center;gap:12px;border-bottom:2px solid #8a5a2b;padding-bottom:14px;margin-bottom:18px;}
    .mark{width:30px;height:30px;border-radius:7px;background:#8a5a2b;}
    .brand{font-weight:800;font-size:18px;letter-spacing:-.02em;flex:1;}
    .top .meta{text-align:right;font-size:11px;color:#8c8073;}
    h1{font-size:22px;margin:0 0 2px;letter-spacing:-.02em;}
    h2{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:#8c8073;margin:24px 0 9px;border-bottom:1px solid #e6dccd;padding-bottom:5px;}
    h3{font-size:15px;margin:0;}
    .sub{color:#8c8073;font-weight:400;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;margin-top:6px;}
    .grid div{padding:3px 0;border-bottom:1px solid #f0eadf;}
    .grid b{display:inline-block;min-width:96px;color:#5b5147;font-weight:600;}
    .pill{display:inline-block;background:#f1e4d3;color:#8a5a2b;font-weight:700;font-size:11px;padding:2px 9px;border-radius:20px;}
    .room{margin:12px 0;page-break-inside:avoid;}
    .rhead{display:flex;align-items:baseline;gap:10px;}
    .rnote{color:#5b5147;font-size:12px;margin:2px 0 6px;}
    table{width:100%;border-collapse:collapse;margin-top:5px;}
    td{padding:5px 8px;border-bottom:1px solid #eee;vertical-align:top;}
    .cat{color:#8c8073;font-size:11px;width:120px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
    .st{width:90px;text-align:right;font-size:11px;font-weight:700;}
    .st.selected{color:#1f7a4d;} .st.considering{color:#b07d1a;}
    .qa td:nth-child(2){width:80px;font-weight:700;} .qa .a.yes{color:#1f7a4d;} .qa .a.no{color:#b3402a;} .qa .a.flag{color:#b07d1a;}
    .num{text-align:right;font-variant-numeric:tabular-nums;width:120px;}
    .est .tot td{border-top:2px solid #231f1a;font-weight:800;}
    .tasks{margin:6px 0 0;padding-left:2px;list-style:none;} .tasks li{padding:3px 0;}
    .photos{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;} .photos img{width:88px;height:88px;object-fit:cover;border-radius:6px;border:1px solid #e6dccd;}
    .empty{color:#b0a799;font-style:italic;padding:4px 0;}
    .foot{margin-top:30px;padding-top:12px;border-top:1px solid #e6dccd;font-size:11px;color:#8c8073;display:flex;justify-content:space-between;}
    @media print{.wrap{padding:0;}@page{margin:14mm;}}
  </style></head><body><div class="wrap">
    <div class="top"><div class="mark"></div><div class="brand">Floorwalk</div><div class="meta">Project Summary<br/>${today}</div></div>
    <h1>${esc(p.customerName)}</h1>
    <div><span class="pill">${esc(st)}</span> &nbsp;<span class="sub">${esc(p.projectType)} · ${p.visitContext === "home" ? "At-home" : "In-store"}</span></div>
    <div class="grid">
      ${p.phone ? `<div><b>Phone</b>${esc(p.phone)}</div>` : ""}
      ${p.email ? `<div><b>Email</b>${esc(p.email)}</div>` : ""}
      ${p.address ? `<div><b>Address</b>${esc(p.address)}</div>` : ""}
      ${p.targetDate ? `<div><b>Target date</b>${fdate(p.targetDate)}</div>` : ""}
      ${p.budget ? `<div><b>Budget</b>${m(p.budget)}</div>` : ""}
    </div>
    ${p.notes ? `<h2>Notes</h2><div>${esc(p.notes)}</div>` : ""}
    <h2>Rooms &amp; selections</h2>${rooms || `<div class="empty">No rooms added</div>`}
    <h2>Questions &amp; answers</h2>${qa}
    ${est ? `<h2>Estimate</h2>${est}` : ""}
    ${tasks ? `<h2>Follow-ups</h2>${tasks}` : ""}
    <div class="foot"><span>Prepared with Floorwalk</span><span>${esc(p.customerName)}</span></div>
  </div></body></html>`;
}

function printSummary(p) {
  const w = window.open("", "_blank");
  if (!w) { alert("Please allow pop-ups to print the summary."); return; }
  w.document.write(buildSummaryHTML(p));
  w.document.close(); w.focus();
  setTimeout(() => { try { w.print(); } catch (e) {} }, 500);
}

function ExportSheet({ p, onClose }) {
  const [copied, setCopied] = useState("");
  const csv = buildCSV(p);
  function download() {
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = p.customerName.replace(/\s+/g, "_") + "_floorwalk.csv"; a.click();
  }
  function copy() { navigator.clipboard && navigator.clipboard.writeText(csv); setCopied("csv"); setTimeout(() => setCopied(""), 1600); }

  return (
    <Sheet title="Share & sync" onClose={onClose}>
      <div className="card" style={{ padding: 16, marginBottom: 14, background: "var(--surface-2)" }}>
        <div className="row" style={{ gap: 12 }}>
          <div style={{ width: 42, height: 42, borderRadius: 11, background: "var(--good-soft)", color: "var(--good)", display: "grid", placeItems: "center", flex: "none" }}><Icon name="sheet" size={22} /></div>
          <div className="grow">
            <div className="b">Google Sheets sync</div>
            <div className="sm muted">Push this project to your shared store spreadsheet.</div>
          </div>
        </div>
        <button className="btn block" style={{ marginTop: 12 }} onClick={() => { setCopied("sheet"); setTimeout(() => setCopied(""), 1800); }}>
          <Icon name="sheet" size={17} />{copied === "sheet" ? "Connect a Google account to enable" : "Connect Google Sheets"}
        </button>
        {copied === "sheet" && <div className="tiny muted" style={{ marginTop: 8, textAlign: "center" }}>Demo: in the live app this opens Google sign-in and writes a row per room.</div>}
      </div>

      <div className="card" style={{ padding: 16, marginBottom: 14, background: "var(--surface-2)" }}>
        <div className="row" style={{ gap: 12 }}>
          <div style={{ width: 42, height: 42, borderRadius: 11, background: "var(--accent-soft)", color: "var(--accent)", display: "grid", placeItems: "center", flex: "none" }}><Icon name="note" size={22} /></div>
          <div className="grow">
            <div className="b">Print summary</div>
            <div className="sm muted">A clean one-pager to print or save as PDF for the customer.</div>
          </div>
        </div>
        <button className="btn primary block" style={{ marginTop: 12 }} onClick={() => printSummary(p)}><Icon name="share" size={17} />Print / Save as PDF</button>
      </div>

      <div className="section-title">Export now</div>
      <button className="btn block" style={{ marginBottom: 9 }} onClick={download}><Icon name="share" size={17} />Download CSV</button>
      <button className="btn block" onClick={copy}><Icon name="sheet" size={17} />{copied === "csv" ? "Copied to clipboard ✓" : "Copy as spreadsheet rows"}</button>

      <div className="divider" />
      <div className="section-title">Preview</div>
      <pre style={{ background: "var(--surface-3)", borderRadius: 10, padding: 12, fontSize: 11, overflow: "auto", maxHeight: 180, margin: 0, fontFamily: "ui-monospace, Menlo, monospace", color: "var(--ink-2)" }}>{csv}</pre>
    </Sheet>
  );
}

Object.assign(window, { BudgetTab, TasksTab, ExportSheet });

</script>
<script type="text/babel">
/* Floorwalk — Project detail shell + Overview tab + tab bar */
function ProjectDetail({ p, mutate, actions }) {
  const [tab, setTab] = useState("overview");
  const [exporting, setExporting] = useState(false);
  const [photos, setPhotos] = useState(false);
  const ctx = p.visitContext || "store";
  const openTasks = p.tasks.filter(t => !t.done).length;
  const unanswered = window.FW.QUESTIONS.filter(q => q.ctx.includes(ctx)).filter(q => !((p.answers || {})[q.id] || {}).val).length;

  const goBack = () => { if (tab !== "overview") { setTab("overview"); window.scrollTo(0, 0); } else { actions.back(); } };

  const TABS = [
    { id: "overview", label: "Overview", icon: "user" },
    { id: "rooms", label: "Rooms", icon: "rooms", badge: p.rooms.length || null },
    { id: "questions", label: "Questions", icon: "question", badge: unanswered || null },
    { id: "budget", label: "Budget", icon: "money" },
    { id: "tasks", label: "Tasks", icon: "tasks", badge: openTasks || null },
  ];

  return (
    <div className="screen">
      <div className="topbar">
        <button className="iconbtn" onClick={goBack} aria-label={tab !== "overview" ? "Back to overview" : "Back to all projects"}><Icon name="back" /></button>
        <div className="grow" style={{ minWidth: 0 }}>
          <h1>{p.customerName}</h1>
          <div className="sub">{tab !== "overview" ? ("‹ Overview · " + (TABS.find(x => x.id === tab) || {}).label) : p.projectType}</div>
        </div>
        <button className="iconbtn" onClick={() => setPhotos(true)} aria-label="Photos" style={{ position: "relative" }}>
          <Icon name="camera" />
          {countPhotos(p) > 0 && <span style={{ position: "absolute", top: -6, right: -6, background: "var(--accent)", color: "var(--accent-ink)", fontSize: 10, fontWeight: 800, minWidth: 16, height: 16, borderRadius: 8, display: "grid", placeItems: "center", padding: "0 4px" }}>{countPhotos(p)}</span>}
        </button>
        <button className="iconbtn" onClick={() => setExporting(true)} aria-label="Share"><Icon name="share" /></button>
      </div>

      {/* visit context + status control bar */}
      <div className="pad" style={{ paddingBottom: 4, position: "sticky", top: 69, zIndex: 20, background: "color-mix(in srgb, var(--bg) 92%, transparent)", backdropFilter: "blur(8px)" }}>
        <div className="spread" style={{ gap: 10 }}>
          <div className="seg" style={{ flex: 1 }}>
            <button style={{ flex: 1, justifyContent: "center" }} className={ctx === "store" ? "on" : ""} onClick={() => mutate(p.id, d => d.visitContext = "store")}><Icon name="store" size={15} />In store</button>
            <button style={{ flex: 1, justifyContent: "center" }} className={ctx === "home" ? "on" : ""} onClick={() => mutate(p.id, d => d.visitContext = "home")}><Icon name="home" size={15} />At home</button>
          </div>
          <select className="input" style={{ width: "auto", fontWeight: 700, padding: "9px 10px" }} value={p.status} onChange={e => mutate(p.id, d => d.status = e.target.value)}>
            {window.FW.STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
          </select>
        </div>
      </div>

      {tab === "overview" && <OverviewTab p={p} mutate={mutate} actions={actions} ctx={ctx} go={setTab} />}
      {tab === "rooms" && <RoomsTab p={p} mutate={mutate} ctx={ctx} />}
      {tab === "questions" && <QuestionsTab p={p} mutate={mutate} ctx={ctx} />}
      {tab === "budget" && <BudgetTab p={p} mutate={mutate} />}
      {tab === "tasks" && <TasksTab p={p} mutate={mutate} />}

      <div className="tabbar">
        {TABS.map(t => (
          <button key={t.id} className={tab === t.id ? "on" : ""} onClick={() => setTab(t.id)} style={{ position: "relative" }}>
            {t.badge ? <span className="badge">{t.badge}</span> : null}
            <Icon name={t.icon} size={21} stroke={tab === t.id ? 2.3 : 2} />
            {t.label}
          </button>
        ))}
      </div>

      {exporting && <ExportSheet p={p} onClose={() => setExporting(false)} />}
      {photos && <ProjectPhotosSheet p={p} mutate={mutate} onClose={() => setPhotos(false)} />}
    </div>
  );
}

function OverviewTab({ p, mutate, actions, ctx, go }) {
  const [editing, setEditing] = useState(false);
  const sel = p.rooms.reduce((n, r) => n + r.products.filter(x => x.status === "selected").length, 0);
  const total = (p.estimate || []).reduce((s, i) => s + (Number(i.amt) || 0), 0);

  return (
    <div className="pad">
      {/* stats — tap to jump; the back arrow returns you to Overview */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 9, marginBottom: 16 }}>
        {[
          { k: "Rooms", v: p.rooms.length, ic: "rooms", go: "rooms" },
          { k: "Picked", v: sel, ic: "check", go: "rooms" },
          { k: "Estimate", v: total ? "$" + (total / 1000).toFixed(total >= 10000 ? 0 : 1) + "k" : "—", ic: "money", go: "budget" },
        ].map(s => (
          <button key={s.k} className="card" onClick={() => go(s.go)} style={{ padding: "13px 12px", textAlign: "left", cursor: "pointer", font: "inherit", color: "inherit" }}>
            <Icon name={s.ic} size={16} style={{ color: "var(--accent)" }} />
            <div className="xb" style={{ fontSize: 22, marginTop: 6, lineHeight: 1 }}>{s.v}</div>
            <div className="tiny muted b" style={{ marginTop: 3 }}>{s.k}</div>
          </button>
        ))}
      </div>

      {/* contact */}
      <div className="card" style={{ padding: 16, marginBottom: 14 }}>
        <div className="spread" style={{ marginBottom: 12 }}>
          <div className="section-title" style={{ margin: 0 }}>Customer</div>
          <button className="linkbtn sm" onClick={() => setEditing(true)}><Icon name="edit" size={13} style={{ verticalAlign: -2 }} /> Edit</button>
        </div>
        <div className="xb" style={{ fontSize: 18 }}>{p.customerName}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 9, marginTop: 12 }}>
          {p.phone && <a className="row" href={"tel:" + p.phone} style={{ gap: 10, color: "var(--ink)", textDecoration: "none" }}><Icon name="phone" size={16} style={{ color: "var(--accent)" }} /><span className="sb">{p.phone}</span></a>}
          {p.email && <a className="row" href={"mailto:" + p.email} style={{ gap: 10, color: "var(--ink)", textDecoration: "none" }}><Icon name="mail" size={16} style={{ color: "var(--accent)" }} /><span className="sb">{p.email}</span></a>}
          {p.address && <div className="row" style={{ gap: 10 }}><Icon name="pin" size={16} style={{ color: "var(--accent)", flex: "none" }} /><span className="sb">{p.address}</span></div>}
          {!p.phone && !p.email && !p.address && <div className="sm muted">No contact details yet — tap Edit.</div>}
        </div>
      </div>

      {/* project meta */}
      <div className="card" style={{ padding: 16, marginBottom: 14 }}>
        <div className="section-title">Project</div>
        <div className="spread" style={{ padding: "9px 0", borderBottom: "1px solid var(--line-2)" }}>
          <span className="sm muted">Type</span>
          <select className="input" style={{ width: "auto", padding: "5px 8px", fontWeight: 600, fontSize: 13.5 }} value={p.projectType} onChange={e => mutate(p.id, d => d.projectType = e.target.value)}>
            {window.FW.PROJECT_TYPES.map(t => <option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="spread" style={{ padding: "11px 0" }}>
          <span className="sm muted">Target date</span>
          <input type="date" className="input" style={{ width: "auto", padding: "5px 8px", fontSize: 13.5, fontWeight: 600 }} value={p.targetDate || ""} onChange={e => mutate(p.id, d => d.targetDate = e.target.value)} />
        </div>
      </div>

      {/* notes */}
      <div className="card" style={{ padding: 16, marginBottom: 14 }}>
        <div className="section-title">Notes</div>
        <textarea className="input" placeholder="Anything to remember about this customer or job…" value={p.notes || ""} onChange={e => mutate(p.id, d => d.notes = e.target.value)} />
      </div>

      <button className="btn block" style={{ color: "var(--danger)" }} onClick={() => { if (confirm("Delete this entire project?")) { actions.deleteProject(p.id); actions.back(); } }}>
        <Icon name="trash" size={16} />Delete project
      </button>

      {editing && <EditContactSheet p={p} mutate={mutate} onClose={() => setEditing(false)} />}
    </div>
  );
}

function EditContactSheet({ p, mutate, onClose }) {
  const [f, setF] = useState({ customerName: p.customerName, phone: p.phone, email: p.email, address: p.address });
  const set = (k, v) => setF(s => ({ ...s, [k]: v }));
  return (
    <Sheet title="Edit customer" onClose={onClose}
      foot={<button className="btn primary block" onClick={() => { mutate(p.id, d => Object.assign(d, f)); onClose(); }}>Save</button>}>
      <Field label="Name"><input className="input" value={f.customerName} onChange={e => set("customerName", e.target.value)} /></Field>
      <Field label="Phone"><input className="input" type="tel" value={f.phone} onChange={e => set("phone", e.target.value)} /></Field>
      <Field label="Email"><input className="input" type="email" value={f.email} onChange={e => set("email", e.target.value)} /></Field>
      <Field label="Address"><input className="input" value={f.address} onChange={e => set("address", e.target.value)} /></Field>
    </Sheet>
  );
}

Object.assign(window, { ProjectDetail });

</script>
<script type="text/babel">
/* Floorwalk — root app: state, persistence, theme tweaks */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "walnut",
  "corners": "soft",
  "fontScale": 16,
  "dark": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [db, setDb] = useState(() => window.FW.load());
  const [activeId, setActiveId] = useState(null);

  // persist
  useEffect(() => { window.FW.save(db); }, [db]);

  // apply theme
  useEffect(() => {
    const r = document.documentElement;
    r.setAttribute("data-theme", t.theme);
    r.setAttribute("data-corners", t.corners);
    r.setAttribute("data-dark", t.dark ? "true" : "false");
    r.style.setProperty("--fs", (t.fontScale || 16) + "px");
  }, [t.theme, t.corners, t.dark, t.fontScale]);

  // quick dark toggle from the home top bar
  useEffect(() => { window.__fwToggleDark = () => setTweak("dark", !t.dark); }, [t.dark]);

  function mutate(id, fn) {
    setDb(prev => ({
      ...prev,
      projects: prev.projects.map(p => {
        if (p.id !== id) return p;
        const c = structuredClone(p); fn(c); c.updatedAt = Date.now(); return c;
      }),
    }));
  }
  const actions = {
    addProject: (proj) => setDb(prev => ({ ...prev, projects: [proj, ...prev.projects] })),
    deleteProject: (id) => setDb(prev => ({ ...prev, projects: prev.projects.filter(p => p.id !== id) })),
    open: (id) => { setActiveId(id); window.scrollTo(0, 0); },
    back: () => { setActiveId(null); window.scrollTo(0, 0); },
  };

  const active = db.projects.find(p => p.id === activeId);

  return (
    <div className="app">
      {active
        ? <ProjectDetail p={active} mutate={mutate} actions={actions} />
        : <ProjectList db={db} actions={actions} />}

      <TweaksPanel>
        <TweakSection label="Visual direction" />
        <TweakRadio label="Theme" value={t.theme} options={["walnut", "terracotta", "slate"]} onChange={v => setTweak("theme", v)} />
        <TweakRadio label="Corners" value={t.corners} options={["soft", "sharp"]} onChange={v => setTweak("corners", v)} />
        <TweakSection label="Display" />
        <TweakSlider label="Text size" value={t.fontScale} min={14} max={19} step={1} unit="px" onChange={v => setTweak("fontScale", v)} />
        <TweakToggle label="Dark mode" value={t.dark} onChange={v => setTweak("dark", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
